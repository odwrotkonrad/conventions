claude-agents:
  options: {autoDiscover: true, execIf: ['builtin:isVirt']}
  include:
    renderTemplates:
      - ctx: {repo: Notes}
        files:
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/ro.md", dest: [{path: .claude/agents/ro.md, options: {skipAutoGeneratedHeader: true}}]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/rw.md", dest: [{path: .claude/agents/rw.md, options: {skipAutoGeneratedHeader: true}}]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/settings.json", dest: [{path: .claude/settings.json, options: {skipAutoGeneratedHeader: true}}]}
          - {source: "@gitlab.com/konradodwrot/configs//templates/agents/snippets/claude-gitignore", dest: [.claude/.gitignore]}
